<!-- FIG. 1 mobile — Mediating apparatus / the lens | Holonograph / Precision Innovations | portrait, designed at phone width | palette: accent=#F2B33D | light=#5BD0E8 | agent=#A569E0 | ink=#EAEAF2 | mut=#8A8A9C | faint=#56566A -->
<svg viewBox="0 0 430 690" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0C14"/><stop offset="1" stop-color="#090910"/>
    </linearGradient>
    <radialGradient id="glowA" cx="88%" cy="6%" r="60%">
      <stop offset="0" stop-color="#F2B33D" stop-opacity=".15"/><stop offset="1" stop-color="#F2B33D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="10%" cy="98%" r="55%">
      <stop offset="0" stop-color="#A569E0" stop-opacity=".13"/><stop offset="1" stop-color="#A569E0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#8A8A9C" stroke-width="1.2"/>
    </marker>
    <style>
      .eye{fill:#F2B33D;font-size:13px;letter-spacing:.18em;font-weight:600}
      .band{fill:#8A8A9C;font-size:11px;letter-spacing:.2em}
      .ttl{fill:#EAEAF2;font-size:13px;letter-spacing:.02em;font-weight:600}
      .sub{fill:#8A8A9C;font-size:10.5px;letter-spacing:.01em}
      .ref{fill:#F2B33D;font-size:10px;letter-spacing:.08em;opacity:.8}
      .ann{fill:#56566A;font-size:10px;letter-spacing:.04em}
      .node{fill:rgba(255,255,255,.018);stroke-width:1.2}
      .flow{stroke:#8A8A9C;stroke-width:1.2;fill:none;opacity:.7}
    </style>
  </defs>

  <rect x="2" y="2" width="426" height="686" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,.07)"/>
  <rect x="2" y="2" width="426" height="686" rx="16" fill="url(#glowA)"/>
  <rect x="2" y="2" width="426" height="686" rx="16" fill="url(#glowB)"/>

  <text class="eye" x="22" y="40">FIG. 1</text>
  <text class="band" x="22" y="62" font-size="10px">MEDIATING APPARATUS · THE LENS</text>

  <!-- LIGHT SOURCE -->
  <text class="band" x="22" y="92" fill="#5BD0E8" font-size="10px">LIGHT SOURCE</text>
  <g stroke="#5BD0E8">
    <rect class="node" x="22" y="102" width="184" height="60" rx="7"/>
    <rect class="node" x="224" y="102" width="184" height="60" rx="7"/>
  </g>
  <text class="ref" x="34" y="122" fill="#5BD0E8">104</text>
  <text class="ttl" x="34" y="140" font-size="12px">PRIMARY MODEL</text>
  <text class="sub" x="34" y="155">canonical identifier</text>
  <text class="ref" x="236" y="122" fill="#5BD0E8">104′</text>
  <text class="ttl" x="236" y="140" font-size="12px">SECONDARY MODEL(S)</text>
  <text class="sub" x="236" y="155">concurrent · FIG. 6</text>

  <path class="flow" d="M208,164 V190" marker-end="url(#ah)"/>
  <path class="flow" d="M222,190 V164" marker-end="url(#ah)"/>

  <!-- LENS -->
  <rect x="22" y="196" width="386" height="288" rx="10" fill="rgba(242,179,61,.04)" stroke="#F2B33D" stroke-opacity=".55" filter="url(#soft)"/>
  <text class="band" x="36" y="222" fill="#F2B33D" font-size="10px" letter-spacing=".16em">THE LENS · MEDIATING APPARATUS</text>
  <text class="ref" x="392" y="222" text-anchor="end" font-size="11px">100</text>
  <g stroke="#F2B33D" stroke-opacity=".75">
    <rect class="node" x="36" y="238" width="179" height="112" rx="7" fill="rgba(242,179,61,.05)"/>
    <rect class="node" x="223" y="238" width="179" height="112" rx="7" fill="rgba(242,179,61,.05)"/>
    <rect class="node" x="36" y="360" width="179" height="112" rx="7" fill="rgba(242,179,61,.05)"/>
    <rect class="node" x="223" y="360" width="179" height="112" rx="7" fill="rgba(242,179,61,.05)"/>
  </g>
  <g>
    <text class="ref" x="50" y="262">110</text>
    <text class="ttl" x="50" y="286" font-size="12px">BIDIRECTIONAL</text>
    <text class="ttl" x="50" y="302" font-size="12px">CALL INTERFACE</text>
    <text class="sub" x="50" y="324">capture path</text>

    <text class="ref" x="237" y="262">120</text>
    <text class="ttl" x="237" y="286" font-size="12px">CONTENT</text>
    <text class="ttl" x="237" y="302" font-size="12px">REGISTRY</text>
    <text class="sub" x="237" y="324">artifact injection</text>

    <text class="ref" x="50" y="384">130</text>
    <text class="ttl" x="50" y="408" font-size="12px">SNAPSHOT</text>
    <text class="ttl" x="50" y="424" font-size="12px">STORE</text>
    <text class="sub" x="50" y="446">four-layer · FIG. 2</text>

    <text class="ref" x="237" y="384">140</text>
    <text class="ttl" x="237" y="408" font-size="12px">VERSION</text>
    <text class="ttl" x="237" y="424" font-size="12px">STORE</text>
    <text class="sub" x="237" y="446">immutable · monotonic</text>
  </g>

  <path class="flow" d="M208,484 V512" marker-end="url(#ah)"/>
  <path class="flow" d="M222,512 V484" marker-end="url(#ah)"/>
  <text class="ann" x="236" y="501">agent calls the lens</text>

  <!-- AGENT -->
  <text class="band" x="22" y="540" fill="#A569E0" font-size="10px">AGENTIC SYSTEM</text>
  <rect class="node" x="22" y="550" width="386" height="66" rx="8" stroke="#A569E0"/>
  <text class="ttl" x="40" y="580">AGENTIC SYSTEM</text>
  <text class="sub" x="40" y="600">single agent or cooperating swarm</text>

  <text x="406" y="660" text-anchor="end" font-size="18px" fill="#F2B33D" opacity=".5" font-style="italic">&#960;</text>
</svg>
