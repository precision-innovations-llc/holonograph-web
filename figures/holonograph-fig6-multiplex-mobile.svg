<!-- FIG. 6 mobile — Concurrent multi-model routing & comparison | Holonograph / Precision Innovations | portrait, designed at phone width | palette: accent=#F2B33D | p=#F2B33D | a=#4D86F7 | b=#FF4D9E | st=#5BD0E8 | ink=#EAEAF2 | mut=#8A8A9C | faint=#56566A -->
<svg viewBox="0 0 430 740" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0C14"/><stop offset="1" stop-color="#090910"/>
    </linearGradient>
    <radialGradient id="glowA" cx="10%" cy="5%" r="52%">
      <stop offset="0" stop-color="#F2B33D" stop-opacity=".12"/><stop offset="1" stop-color="#F2B33D" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#8A8A9C" stroke-width="1.2"/>
    </marker>
    <style>
      .eye{fill:#F2B33D;font-size:13px;letter-spacing:.16em;font-weight:600}
      .band{fill:#8A8A9C;font-size:10px;letter-spacing:.16em}
      .ttl{fill:#EAEAF2;font-size:12.5px;letter-spacing:.02em;font-weight:600}
      .sub{fill:#8A8A9C;font-size:10px;letter-spacing:.01em}
      .ref{font-size:9.5px;letter-spacing:.08em;opacity:.85}
      .flow{stroke:#8A8A9C;stroke-width:1.3;fill:none;opacity:.7}
      .hd{fill:#8A8A9C;font-size:8.5px;letter-spacing:.05em}
      .cell{fill:#EAEAF2;font-size:11px}
    </style>
  </defs>

  <rect x="2" y="2" width="426" height="736" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,.07)"/>
  <rect x="2" y="2" width="426" height="736" rx="16" fill="url(#glowA)"/>

  <text class="eye" x="22" y="40">FIG. 6</text>
  <text class="band" x="22" y="60">MULTI-MODEL ROUTING &#38; COMPARISON</text>

  <!-- input -->
  <rect x="115" y="80" width="200" height="60" rx="8" fill="rgba(255,255,255,.018)" stroke="#8A8A9C" stroke-opacity=".55"/>
  <text class="ref" x="131" y="104" fill="#8A8A9C">610</text>
  <text class="ttl" x="131" y="120" font-size="12px">IDENTICAL REQUEST</text>
  <text class="sub" x="131" y="134">+ captured state / artifacts</text>

  <!-- identical request distributed to three concurrent routes -->
  <path class="flow" d="M215,140 V150 H46 V387"/>
  <path class="flow" d="M46,231 H62" marker-end="url(#ah)"/>
  <path class="flow" d="M46,309 H62" marker-end="url(#ah)"/>
  <path class="flow" d="M46,387 H62" marker-end="url(#ah)"/>
  <text class="sub" x="32" y="300" fill="#56566A" transform="rotate(-90 32 300)" text-anchor="middle">concurrent</text>

  <!-- three model nodes -->
  <rect x="64" y="200" width="302" height="62" rx="8" fill="rgba(242,179,61,.06)" stroke="#F2B33D" stroke-opacity=".75" filter="url(#soft)"/>
  <text class="ref" x="82" y="224" fill="#F2B33D">620</text>
  <text class="ttl" x="82" y="240">PRIMARY MODEL</text>
  <text class="sub" x="82" y="255">canonical id · returned to caller</text>

  <rect x="64" y="278" width="302" height="62" rx="8" fill="rgba(77,134,247,.06)" stroke="#4D86F7" stroke-opacity=".75"/>
  <text class="ref" x="82" y="302" fill="#4D86F7">622</text>
  <text class="ttl" x="82" y="318">SECONDARY A</text>
  <text class="sub" x="82" y="333">observation route</text>

  <rect x="64" y="356" width="302" height="62" rx="8" fill="rgba(255,77,158,.06)" stroke="#FF4D9E" stroke-opacity=".75"/>
  <text class="ref" x="82" y="380" fill="#FF4D9E">624</text>
  <text class="ttl" x="82" y="396">SECONDARY B</text>
  <text class="sub" x="82" y="411">observation route</text>

  <text class="sub" x="215" y="440" text-anchor="middle" fill="#8A8A9C">snapshot + grade · shared correlation id</text>
  <path class="flow" d="M215,418 V430 M215,446 V462" marker-end="url(#ah)"/>

  <!-- comparison table -->
  <rect x="24" y="470" width="382" height="228" rx="10" fill="rgba(242,179,61,.03)" stroke="#F2B33D" stroke-opacity=".5"/>
  <text class="band" x="40" y="496" fill="#F2B33D" letter-spacing=".12em">COMPARISON SURFACE</text>
  <text class="ref" x="390" y="496" text-anchor="end" fill="#F2B33D">650</text>

  <g>
    <text class="hd" x="40" y="524">MODEL</text>
    <text class="hd" x="212" y="524" text-anchor="middle">DIV</text>
    <text class="hd" x="268" y="524" text-anchor="middle">GRADE</text>
    <text class="hd" x="330" y="524" text-anchor="middle">COST</text>
    <text class="hd" x="390" y="524" text-anchor="end">LAT</text>
    <line x1="40" y1="534" x2="390" y2="534" stroke="rgba(255,255,255,.07)" stroke-width="1"/>
  </g>
  <g>
    <circle cx="46" cy="560" r="4" fill="#F2B33D"/>
    <text class="cell" x="58" y="564">primary</text>
    <text class="cell" x="212" y="564" text-anchor="middle" fill="#8A8A9C">&#8212;</text>
    <text class="cell" x="268" y="564" text-anchor="middle">0.91</text>
    <text class="cell" x="330" y="564" text-anchor="middle">$$</text>
    <text class="cell" x="390" y="564" text-anchor="end">med</text>

    <line x1="40" y1="580" x2="390" y2="580" stroke="rgba(255,255,255,.07)" stroke-width="1" opacity=".5"/>
    <circle cx="46" cy="606" r="4" fill="#4D86F7"/>
    <text class="cell" x="58" y="610">secondary A</text>
    <text class="cell" x="212" y="610" text-anchor="middle" fill="#4D86F7">low</text>
    <text class="cell" x="268" y="610" text-anchor="middle">0.89</text>
    <text class="cell" x="330" y="610" text-anchor="middle" fill="#5BD0E8">$</text>
    <text class="cell" x="390" y="610" text-anchor="end" fill="#5BD0E8">fast</text>

    <line x1="40" y1="626" x2="390" y2="626" stroke="rgba(255,255,255,.07)" stroke-width="1" opacity=".5"/>
    <circle cx="46" cy="652" r="4" fill="#FF4D9E"/>
    <text class="cell" x="58" y="656">secondary B</text>
    <text class="cell" x="212" y="656" text-anchor="middle" fill="#FF4D9E">high</text>
    <text class="cell" x="268" y="656" text-anchor="middle">0.72</text>
    <text class="cell" x="330" y="656" text-anchor="middle">$$$</text>
    <text class="cell" x="390" y="656" text-anchor="end">slow</text>
  </g>
  <text class="ttl" x="40" y="686" font-size="12px" fill="#F2B33D">accuracy · price · speed</text>

  <text x="406" y="722" text-anchor="end" font-size="18px" fill="#F2B33D" opacity=".5" font-style="italic">&#960;</text>
</svg>
