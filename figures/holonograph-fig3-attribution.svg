<!-- FIG. 3 — Source-resolved attribution (Attribution) | Holonograph / Precision Innovations | palette: accent=#4D86F7 | ls=#FF4D9E | st=#5BD0E8 | ln=#A569E0 | ink=#EAEAF2 | mut=#8A8A9C | faint=#56566A -->
<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0C14"/><stop offset="1" stop-color="#090910"/>
    </linearGradient>
    <radialGradient id="glowA" cx="88%" cy="14%" r="55%">
      <stop offset="0" stop-color="#4D86F7" stop-opacity=".13"/><stop offset="1" stop-color="#4D86F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .eye{fill:#4D86F7;font-size:13px;letter-spacing:.22em;font-weight:600}
      .band{fill:#8A8A9C;font-size:11px;letter-spacing:.26em}
      .ttl{fill:#EAEAF2;font-size:13px;letter-spacing:.04em;font-weight:600}
      .sub{fill:#8A8A9C;font-size:10.5px;letter-spacing:.02em}
      .ref{fill:#4D86F7;font-size:10px;letter-spacing:.1em;opacity:.8}
      .ann{fill:#56566A;font-size:10px;letter-spacing:.06em}
      .axis{stroke:#8A8A9C;stroke-width:1.2;opacity:.6}
      .cp{stroke:#8A8A9C;stroke-width:1;stroke-dasharray:3 5;opacity:.45}
    </style>
  </defs>

  <rect x="2" y="2" width="1196" height="671" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,.07)"/>
  <rect x="2" y="2" width="1196" height="671" rx="16" fill="url(#glowA)"/>

  <text class="eye" x="44" y="52">FIG. 3</text>
  <text class="band" x="120" y="51">SOURCE-RESOLVED ATTRIBUTION OF EVALUATION DRIFT</text>

  <!-- plot frame -->
  <line class="axis" x1="118" y1="130" x2="118" y2="512"/>
  <line class="axis" x1="118" y1="512" x2="828" y2="512"/>
  <text class="band" x="58" y="320" transform="rotate(-90 58 320)" text-anchor="middle" font-size="10px">EVAL RESULT</text>
  <text class="ann" x="828" y="540" text-anchor="end" letter-spacing=".18em" fill="#8A8A9C">TIME &#8594;</text>
  <text class="ann" x="124" y="148" fill="#8A8A9C">350 temporal window</text>

  <!-- baseline band -->
  <rect x="118" y="296" width="710" height="50" fill="#4D86F7" opacity=".09"/>
  <line x1="118" y1="321" x2="828" y2="321" stroke="#4D86F7" stroke-width="1" stroke-dasharray="2 4" opacity=".5"/>
  <text class="ref" x="140" y="289" fill="#4D86F7">300 declared baseline &#177; tolerance</text>

  <!-- change-point verticals -->
  <line class="cp" x1="290" y1="130" x2="290" y2="512"/>
  <line class="cp" x1="490" y1="130" x2="490" y2="512"/>
  <line class="cp" x1="670" y1="130" x2="670" y2="512"/>

  <!-- eval result line -->
  <polyline points="118,321 290,321 290,236 490,236 490,332 670,332 670,286 828,286"
    fill="none" stroke="#EAEAF2" stroke-width="2" opacity=".9" filter="url(#soft)"/>

  <!-- markers at change-points -->
  <path d="M290,222 l9,16 l-18,0 z" fill="#FF4D9E" filter="url(#soft)"/>
  <rect x="482" y="324" width="16" height="16" fill="#5BD0E8" filter="url(#soft)"/>
  <path d="M670,272 l11,12 l-11,12 l-11,-12 z" fill="#A569E0" filter="url(#soft)"/>

  <text class="ref" x="290" y="534" text-anchor="middle" fill="#FF4D9E">CP1</text>
  <text class="ref" x="490" y="534" text-anchor="middle" fill="#5BD0E8">CP2</text>
  <text class="ref" x="670" y="534" text-anchor="middle" fill="#A569E0">CP3</text>
  <text class="ann" x="124" y="500">310 change-point &#8594; attributed to exactly one source</text>

  <!-- legend -->
  <line x1="868" y1="120" x2="868" y2="540" stroke="rgba(255,255,255,.07)" stroke-width="1"/>
  <text class="band" x="892" y="150" fill="#8A8A9C">ATTRIBUTION AXES</text>

  <g transform="translate(892,182)">
    <path d="M10,0 l9,16 l-18,0 z" fill="#FF4D9E"/>
    <text class="ttl" x="34" y="8" font-size="12px">LIGHT-SOURCE</text>
    <text class="ref" x="250" y="8" text-anchor="end" fill="#FF4D9E">330</text>
    <text class="sub" x="34" y="26">model axis · CP1</text>
    <text class="sub" x="34" y="42" fill="#56566A">opaque · silent re-route</text>
  </g>
  <g transform="translate(892,278)">
    <rect x="2" y="2" width="16" height="16" fill="#5BD0E8"/>
    <text class="ttl" x="34" y="8" font-size="12px">SUBSTRATE</text>
    <text class="ref" x="250" y="8" text-anchor="end" fill="#5BD0E8">320</text>
    <text class="sub" x="34" y="26">operator-state axis · CP2</text>
    <text class="sub" x="34" y="42" fill="#56566A">transparent · operator fix deployed</text>
  </g>
  <g transform="translate(892,374)">
    <path d="M10,0 l11,12 l-11,12 l-11,-12 z" fill="#A569E0"/>
    <text class="ttl" x="34" y="8" font-size="12px">LENS</text>
    <text class="ref" x="250" y="8" text-anchor="end" fill="#A569E0">340</text>
    <text class="sub" x="34" y="26">apparatus-config axis · CP3</text>
    <text class="sub" x="34" y="42" fill="#56566A">announced · 3rd-party dep update</text>
  </g>

  <text x="1158" y="650" text-anchor="end" font-size="20px" fill="#4D86F7" opacity=".5" font-style="italic">&#960;</text>
</svg>
