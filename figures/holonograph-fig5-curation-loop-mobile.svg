<!-- FIG. 5 mobile — Closed-loop remediation / curation loop | Holonograph / Precision Innovations | portrait, designed at phone width | palette: accent=#A569E0 | c1=#F2B33D | c2=#5BD0E8 | c3=#FF4D9E | c4=#4D86F7 | ink=#EAEAF2 | mut=#8A8A9C | faint=#56566A -->
<svg viewBox="0 0 430 850" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0C14"/><stop offset="1" stop-color="#090910"/>
    </linearGradient>
    <radialGradient id="glowA" cx="88%" cy="5%" r="50%">
      <stop offset="0" stop-color="#A569E0" stop-opacity=".14"/><stop offset="1" stop-color="#A569E0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#8A8A9C" stroke-width="1.2"/>
    </marker>
    <marker id="ahL" markerWidth="10" markerHeight="10" refX="6.5" refY="5" orient="auto">
      <path d="M1,1 L8,5 L1,9" fill="none" stroke="#A569E0" stroke-width="1.4"/>
    </marker>
    <style>
      .eye{fill:#A569E0;font-size:13px;letter-spacing:.18em;font-weight:600}
      .band{fill:#8A8A9C;font-size:10px;letter-spacing:.16em}
      .ttl{fill:#EAEAF2;font-size:12.5px;letter-spacing:.02em;font-weight:600}
      .sub{fill:#8A8A9C;font-size:10px;letter-spacing:.01em}
      .ref{fill:#A569E0;font-size:10px;letter-spacing:.08em;opacity:.8}
      .node{fill:rgba(165,105,224,.05);stroke:#A569E0;stroke-opacity:.65;stroke-width:1.2}
      .flow{stroke:#8A8A9C;stroke-width:1.3;fill:none;opacity:.75}
    </style>
  </defs>

  <rect x="2" y="2" width="426" height="846" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,.07)"/>
  <rect x="2" y="2" width="426" height="846" rx="16" fill="url(#glowA)"/>

  <text class="eye" x="22" y="40">FIG. 5</text>
  <text class="band" x="22" y="60">CLOSED-LOOP REMEDIATION PIPELINE</text>

  <!-- stages -->
  <rect class="node" x="64" y="78" width="346" height="76" rx="8"/>
  <text class="ref" x="82" y="104">510</text>
  <text class="ttl" x="82" y="126">CLUSTER</text>
  <text class="sub" x="82" y="144">recurring failures / overrides &#8594; pattern</text>

  <rect class="node" x="64" y="190" width="346" height="76" rx="8"/>
  <text class="ref" x="82" y="216">520</text>
  <text class="ttl" x="82" y="238">CLASSIFY PATTERN</text>
  <text class="sub" x="82" y="256">localized vs distributed · &#167;9 set-stability</text>

  <rect class="node" x="64" y="302" width="346" height="76" rx="8"/>
  <text class="ref" x="82" y="328">530</text>
  <text class="ttl" x="82" y="350">DIAGNOSE ROOT CAUSE</text>
  <text class="sub" x="82" y="368">classify into remediation tier</text>

  <rect class="node" x="64" y="414" width="346" height="76" rx="8"/>
  <text class="ref" x="82" y="440">540</text>
  <text class="ttl" x="82" y="462">SELECT ARTIFACT KIND</text>
  <text class="sub" x="82" y="480">tier &#8594; kind · human-gated</text>

  <path class="flow" d="M237,154 V186" marker-end="url(#ah)"/>
  <path class="flow" d="M237,266 V298" marker-end="url(#ah)"/>
  <path class="flow" d="M237,378 V410" marker-end="url(#ah)"/>

  <!-- artifact-kind chips 2x2 -->
  <text class="band" x="64" y="524" fill="#8A8A9C">CORRECTIVE-ARTIFACT KINDS</text>
  <g font-size="12px" letter-spacing=".03em">
    <rect x="64"  y="536" width="168" height="40" rx="7" fill="rgba(242,179,61,.06)" stroke="#F2B33D" stroke-opacity=".7"/>
    <text x="148" y="561" text-anchor="middle" fill="#F2B33D">skill</text>
    <rect x="242" y="536" width="168" height="40" rx="7" fill="rgba(91,208,232,.06)" stroke="#5BD0E8" stroke-opacity=".7"/>
    <text x="326" y="561" text-anchor="middle" fill="#5BD0E8">lesson</text>
    <rect x="64"  y="584" width="168" height="40" rx="7" fill="rgba(255,77,158,.06)" stroke="#FF4D9E" stroke-opacity=".7"/>
    <text x="148" y="609" text-anchor="middle" fill="#FF4D9E">code / schema</text>
    <rect x="242" y="584" width="168" height="40" rx="7" fill="rgba(77,134,247,.06)" stroke="#4D86F7" stroke-opacity=".7"/>
    <text x="326" y="609" text-anchor="middle" fill="#4D86F7">fixture</text>
  </g>
  <path class="flow" d="M237,490 V524" marker-end="url(#ah)" opacity=".5"/>

  <!-- publish -->
  <rect class="node" x="64" y="648" width="346" height="80" rx="8" fill="rgba(165,105,224,.08)" filter="url(#soft)"/>
  <text class="ref" x="82" y="674">550</text>
  <text class="ttl" x="82" y="696">HIL APPROVAL &#8594; PUBLISH</text>
  <text class="sub" x="82" y="714">approved artifact enters content registry</text>
  <path class="flow" d="M237,624 V646" marker-end="url(#ah)"/>

  <!-- closed loop back up the left gutter -->
  <path d="M64,688 H36 V116 H60" fill="none" stroke="#A569E0" stroke-width="1.6" opacity=".9"
    marker-end="url(#ahL)" filter="url(#soft)"/>

  <text class="ttl" x="215" y="768" text-anchor="middle" font-size="12px" fill="#A569E0">published artifact becomes substrate</text>
  <text class="sub" x="215" y="786" text-anchor="middle" fill="#8A8A9C">observed by the same lens it improves</text>

  <text x="406" y="822" text-anchor="end" font-size="18px" fill="#A569E0" opacity=".5" font-style="italic">&#960;</text>
</svg>
