  <path class="flow" d="M606,150 V232" marker-end="url(#ah)"/>
  <path class="flow" d="M620,232 V150" marker-end="url(#ah)"/>
  <text class="ann" x="660" y="196">request · response · full four-layer capture</text>

  <!-- LENS CONTAINER -->
  <rect x="44" y="246" width="1112" height="216" rx="12" fill="rgba(242,179,61,.04)" stroke="#F2B33D" stroke-opacity=".55" filter="url(#soft)"/>
  <text class="band" x="68" y="276" fill="#F2B33D" letter-spacing=".24em">THE LENS · MEDIATING APPARATUS</text>
  <text class="ref" x="1130" y="276" text-anchor="end" font-size="12px">100</text>
  <g stroke="#F2B33D" stroke-opacity=".8">
    <rect class="node" x="68" y="296" width="252" height="146" fill="rgba(242,179,61,.05)"/>
    <rect class="node" x="340" y="296" width="252" height="146" fill="rgba(242,179,61,.05)"/>
    <rect class="node" x="612" y="296" width="252" height="146" fill="rgba(242,179,61,.05)"/>
    <rect class="node" x="884" y="296" width="252" height="146" fill="rgba(242,179,61,.05)"/>
  </g>
  <g>
    <text class="ref" x="86" y="322">110</text>
    <text class="ttl" x="86" y="356" font-size="13px">BIDIRECTIONAL</text>
    <text class="ttl" x="86" y="374" font-size="13px">CALL INTERFACE</text>
    <text class="sub" x="86" y="398">capture path</text>

    <text class="ref" x="358" y="322">120</text>
    <text class="ttl" x="358" y="356" font-size="13px">CONTENT REGISTRY</text>
    <text class="sub" x="358" y="378">corrective-artifact</text>
    <text class="sub" x="358" y="394">injection</text>

    <text class="ref" x="630" y="322">130</text>
    <text class="ttl" x="630" y="356" font-size="13px">PER-EVENT</text>
    <text class="ttl" x="630" y="374" font-size="13px">SNAPSHOT STORE</text>
    <text class="sub" x="630" y="398">four-layer · FIG. 2</text>

    <text class="ref" x="902" y="322">140</text>
    <text class="ttl" x="902" y="356" font-size="13px">APPARATUS-VERSION</text>
    <text class="ttl" x="902" y="374" font-size="13px">STORE</text>
    <text class="sub" x="902" y="398">immutable · monotonic</text>
  </g>

  <!-- lens <-> agent arrows -->
  <path class="flow" d="M606,462 V544" marker-end="url(#ah)"/>
  <path class="flow" d="M620,544 V462" marker-end="url(#ah)"/>
  <text class="ann" x="660" y="508">agent calls the lens, not the model</text>
  <text class="ann" x="660" y="524" fill="#8A8A9C" opacity=".7">unaware of source · injection · grading</text>

  <!-- AGENT -->
  <text class="band" x="44" y="568" fill="#A569E0">AGENTIC SYSTEM</text>
  <rect class="node" x="372" y="556" width="468" height="72" stroke="#A569E0"/>
  <text class="ttl" x="396" y="588">AGENTIC SYSTEM</text>
  <text class="sub" x="396" y="608">single agent or cooperating swarm</text>

  <text x="1158" y="650" text-anchor="end" font-size="20px" fill="#F2B33D" opacity=".5" font-style="italic">&#960;</text>
</svg>
