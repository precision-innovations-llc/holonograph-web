<!-- FIG. 1 — Mediating apparatus / the lens (About · Observability) | Holonograph / Precision Innovations | palette: accent=#F2B33D | light=#5BD0E8 | agent=#A569E0 | ink=#EAEAF2 | mut=#8A8A9C | faint=#56566A -->
<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0C14"/><stop offset="1" stop-color="#090910"/>
    </linearGradient>
    <radialGradient id="glowA" cx="85%" cy="12%" r="60%">
      <stop offset="0" stop-color="#F2B33D" stop-opacity=".16"/><stop offset="1" stop-color="#F2B33D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="12%" cy="92%" r="55%">
      <stop offset="0" stop-color="#A569E0" stop-opacity=".13"/><stop offset="1" stop-color="#A569E0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#8A8A9C" stroke-width="1.2"/>
    </marker>
    <style>
      .eye{fill:#F2B33D;font-size:13px;letter-spacing:.22em;font-weight:600}
      .band{fill:#8A8A9C;font-size:11px;letter-spacing:.28em}
      .ttl{fill:#EAEAF2;font-size:14px;letter-spacing:.04em;font-weight:600}
      .sub{fill:#8A8A9C;font-size:10.5px;letter-spacing:.02em}
      .ref{fill:#F2B33D;font-size:10px;letter-spacing:.1em;opacity:.75}
      .ann{fill:#56566A;font-size:10px;letter-spacing:.06em}
      .node{fill:rgba(255,255,255,.018);stroke-width:1.25;rx:8}
      .flow{stroke:#8A8A9C;stroke-width:1.2;fill:none;opacity:.7}
    </style>
  </defs>

  <rect x="2" y="2" width="1196" height="671" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,.07)"/>
  <rect x="2" y="2" width="1196" height="671" rx="16" fill="url(#glowA)"/>
  <rect x="2" y="2" width="1196" height="671" rx="16" fill="url(#glowB)"/>
  <g stroke="rgba(255,255,255,.07)" stroke-width="1">
    <path d="M0,168 H1200 M0,486 H1200" opacity=".5"/>
  </g>

  <text class="eye" x="44" y="52">FIG. 1</text>
  <text class="band" x="120" y="51">MEDIATING APPARATUS · THE LENS</text>
  <text class="ann" x="1156" y="52" text-anchor="end" fill="#8A8A9C" letter-spacing=".2em">100 OCCUPIES THE CALL BOUNDARY</text>

  <!-- LIGHT SOURCE -->
  <text class="band" x="44" y="108" fill="#5BD0E8">LIGHT SOURCE</text>
  <g stroke="#5BD0E8">
    <rect class="node" x="372" y="84" width="216" height="64"/>
    <rect class="node" x="624" y="84" width="216" height="64"/>
  </g>
  <text class="ref" x="388" y="104" fill="#5BD0E8">104</text>
  <text class="ttl" x="388" y="120">PRIMARY MODEL</text>
  <text class="sub" x="388" y="138">canonical identifier</text>
  <text class="ref" x="640" y="104" fill="#5BD0E8">104′</text>
  <text class="ttl" x="640" y="120">SECONDARY MODEL(S)</text>
  <text class="sub" x="640" y="138">concurrent route · FIG. 6</text>

